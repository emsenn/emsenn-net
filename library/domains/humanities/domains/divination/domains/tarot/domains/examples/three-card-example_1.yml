spread: three-card
positions:
  - name: past
    role: background or origin
  - name: present
    role: current situation
  - name: future
    role: likely direction
draw:
  - position: past
    card: The Fool
    orientation: upright
  - position: present
    card: Two of Cups
    orientation: upright
  - position: future
    card: The Tower
    orientation: reversed
